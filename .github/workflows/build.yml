name: Build plugin

on:
  push:
    branches: [ master ]
    paths:
      - 'Jellyfin.Plugin.SkinManager/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >-
          dotnet publish Jellyfin.Plugin.SkinManager/Jellyfin.Plugin.SkinManager.csproj
          --configuration Release
          --output publish

      - name: Upload plugin DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.SkinManager
          path: publish/Jellyfin.Plugin.SkinManager.dll
          if-no-files-found: error
